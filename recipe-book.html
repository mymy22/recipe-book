<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="レシピ帳">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#E8622A">
<title>🍳 My Recipe Book</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
body{font-family:'Noto Sans JP','Hiragino Sans',sans-serif;background:#FFF8F0;overscroll-behavior:none}
input,select,textarea,button{font-family:inherit}
::-webkit-scrollbar{display:none}
.app{max-width:430px;margin:0 auto;min-height:100vh;position:relative}
.scroll-row{display:flex;gap:8px;overflow-x:auto;padding:10px 16px;background:#fff;border-bottom:1px solid #F0DDD0;scrollbar-width:none}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:14px}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;display:flex;align-items:flex-end}
.modal-box{background:#fff;border-radius:24px 24px 0 0;width:100%;max-width:430px;margin:0 auto;max-height:82vh;display:flex;flex-direction:column}
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:#fff;border-top:2px solid #F0DDD0;display:flex;z-index:200}
.fab{position:fixed;bottom:74px;right:max(16px,calc(50% - 200px));background:#E8622A;color:#fff;border:none;border-radius:50%;width:54px;height:54px;font-size:26px;cursor:pointer;box-shadow:0 4px 20px rgba(232,98,42,.4);display:flex;align-items:center;justify-content:center;z-index:150}
.chip{border:2px solid #F0DDD0;background:#FFFAF7;color:#9C6E4A;border-radius:99px;padding:6px 14px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap}
.on{border:none!important;background:#E8622A!important;color:#fff!important}
.card{background:#fff;border-radius:18px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.07);cursor:pointer;border:1px solid #F0DDD0}
.fi{width:100%;padding:12px 14px;border:2px solid #F0DDD0;border-radius:12px;font-size:16px;background:#FFFAF7;color:#2D1B0E;outline:none;display:block}
textarea.fi{resize:vertical;min-height:80px}
.lbl{font-size:12px;font-weight:800;color:#9C6E4A;margin-bottom:5px;display:block;letter-spacing:.3px}
.btn{background:#E8622A;color:#fff;border:none;border-radius:12px;padding:13px 16px;font-size:15px;font-weight:800;cursor:pointer;width:100%;display:block;text-align:center}
.btn.sec{background:#FFF5EE;color:#E8622A;border:2px solid #F0DDD0}
.btn.danger{background:#FFF0F0;color:#DC2626;border:2px solid #FECACA}
.btn:disabled{background:#D1D5DB;color:#9CA3AF;cursor:not-allowed}
</style>
</head>
<body>
<div class="app" id="app"></div>
<script>
const AC="#E8622A";
const GENRES=["すべて","和食","洋食","中華","韓国料理","イタリアン","デザート","お弁当","麺・パスタ","スープ","サラダ","その他"];
const SOURCES=[{id:"instagram",label:"Instagram",color:"#E1306C",emoji:"📸"},{id:"youtube",label:"YouTube",color:"#FF0000",emoji:"▶️"},{id:"tiktok",label:"TikTok",color:"#555",emoji:"🎵"},{id:"twitter",label:"X",color:"#1DA1F2",emoji:"✕"},{id:"cookpad",label:"Cookpad",color:"#F76300",emoji:"🍳"},{id:"kurashiru",label:"クラシル",color:"#3CB371",emoji:"🥗"},{id:"website",label:"Webサイト",color:"#6B7280",emoji:"🌐"},{id:"memo",label:"自分メモ",color:"#8B5CF6",emoji:"📝"}];
const SM=Object.fromEntries(SOURCES.map(s=>[s.id,s]));
const DEFING=[
  {id:"pork",icon:"🐷",name:"豚肉",items:["豚バラ","豚こま切れ","豚ロース","豚肩ロース","豚もも","豚ひき肉","豚スペアリブ","豚レバー"]},
  {id:"beef",icon:"🐄",name:"牛肉",items:["牛バラ","牛こま切れ","牛ロース","牛ひき肉","牛もも","牛すね","牛タン","牛カルビ"]},
  {id:"chicken",icon:"🐔",name:"鶏肉",items:["鶏むね肉","鶏もも肉","鶏ささみ","鶏手羽元","鶏手羽先","鶏ひき肉","鶏レバー","鶏皮"]},
  {id:"seafood",icon:"🐟",name:"魚介",items:["サーモン","マグロ","アジ","サバ","鮭","タラ","エビ","イカ","ホタテ","アサリ","カニ","タコ"]},
  {id:"egg",icon:"🥚",name:"卵・乳製品",items:["卵","牛乳","生クリーム","バター","チーズ","ヨーグルト","豆腐","油揚げ"]},
  {id:"veg",icon:"🥦",name:"野菜",items:["玉ねぎ","にんにく","しょうが","じゃがいも","にんじん","大根","キャベツ","レタス","トマト","なす","ピーマン","ブロッコリー","ほうれん草","小松菜","白菜","もやし","ねぎ","ごぼう","れんこん","アボカド"]},
  {id:"mush",icon:"🍄",name:"きのこ",items:["しいたけ","えのき","しめじ","エリンギ","なめこ","まいたけ"]},
  {id:"grain",icon:"🌾",name:"穀物・麺",items:["米","パスタ","うどん","そば","ラーメン","そうめん","パン粉","小麦粉","片栗粉"]},
  {id:"beans",icon:"🫘",name:"豆・大豆",items:["豆腐","納豆","大豆","ひよこ豆","小豆","枝豆","厚揚げ"]}
];
const SEED=[
  {id:"1",title:"肉じゃが",genre:"和食",source:"cookpad",url:"https://cookpad.com",thumbnail:"https://images.unsplash.com/photo-1547592166-23ac45744acd?w=400&q=80",memo:"砂糖大さじ2、醤油大さじ3。じゃがいもは最後に入れると崩れない！",tags:["定番","お弁当OK"],rating:5,cookedCount:8,createdAt:Date.now()-864e5*10,ingredients:["豚こま切れ","じゃがいも","玉ねぎ","にんじん"]},
  {id:"2",title:"カルボナーラ",genre:"イタリアン",source:"youtube",url:"",thumbnail:"https://images.unsplash.com/photo-1612874742237-6526221588e3?w=400&q=80",memo:"卵黄2個＋全卵1個。火を止めてから混ぜるのがポイント。",tags:["時短","パスタ"],rating:4,cookedCount:5,createdAt:Date.now()-864e5*5,ingredients:["パスタ","卵","生クリーム","チーズ"]},
  {id:"3",title:"キムチ鍋",genre:"韓国料理",source:"tiktok",url:"",thumbnail:"https://images.unsplash.com/photo-1583224964978-2257b8a897b8?w=400&q=80",memo:"キムチ200g、豆腐1丁、豚バラ200g。ごま油で仕上げ。",tags:["冬","鍋"],rating:4,cookedCount:6,createdAt:Date.now()-864e5*1,ingredients:["豚バラ","豆腐","白菜","ねぎ","えのき"]},
  {id:"4",title:"鶏むね照り焼き",genre:"和食",source:"kurashiru",url:"",thumbnail:"https://images.unsplash.com/photo-1598515214211-89d3c73ae83b?w=400&q=80",memo:"醤油・みりん・酒各大さじ2。片栗粉まぶすとジューシー！",tags:["ヘルシー","お弁当OK"],rating:5,cookedCount:12,createdAt:Date.now()-864e5*3,ingredients:["鶏むね肉","しょうが","にんにく"]}
];

// ─── DB (localStorage) ───────────────────────────────────────────────────────
const DB_KEY="rb_v4";
function dbLoad(){try{const d=localStorage.getItem(DB_KEY);return d?JSON.parse(d):null;}catch{return null;}}
function dbSave(d){try{localStorage.setItem(DB_KEY,JSON.stringify(d));}catch{}}
let DB=dbLoad();
if(!DB){DB={recipes:JSON.parse(JSON.stringify(SEED)),users:[],ingMaster:JSON.parse(JSON.stringify(DEFING))};dbSave(DB);}
if(!DB.ingMaster){DB.ingMaster=JSON.parse(JSON.stringify(DEFING));dbSave(DB);}

// ─── State ───────────────────────────────────────────────────────────────────
const SESS="rb_sess_v4";
let U=null;
try{const s=sessionStorage.getItem(SESS);if(s){const u=JSON.parse(s);const f=DB.users.find(x=>x.email===u.email);if(f)U=f;}}catch{}

let V={
  view:U?"home":"login",
  recipes:[...DB.recipes],
  ingMaster:[...DB.ingMaster],
  sel:null,
  fGenre:"すべて",fSrc:"all",q:"",sort:"newest",fIng:[],
  showIM:false,showCM:false,showFI:false,
  form:{title:"",genre:"和食",source:"cookpad",url:"",memo:"",tags:"",rating:5,thumbnail:"",ingredients:[]},
  fStep:1,saving:false,aiState:"idle",aiMsg:"",
  lf:{email:"",password:"",name:"",isNew:false},lErr:"",
  imc:null,fic:null,cmt:"list",cme:null,cnn:"",cni:"🍱",fc:null
};

function sv(p){Object.assign(V,p);render();}
window.sv=sv;

// ─── Helpers ─────────────────────────────────────────────────────────────────
function dSrc(u){if(!u)return"memo";if(u.includes("instagram"))return"instagram";if(u.includes("youtube")||u.includes("youtu.be"))return"youtube";if(u.includes("tiktok"))return"tiktok";if(u.includes("twitter")||u.includes("x.com"))return"twitter";if(u.includes("cookpad"))return"cookpad";if(u.includes("kurashiru"))return"kurashiru";return"website";}
function ytT(u){const m=u.match(/(?:v=|youtu\.be\/)([A-Za-z0-9_-]{11})/);return m?"https://img.youtube.com/vi/"+m[1]+"/hqdefault.jpg":null;}
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;");}
function stars(v,ed){return[1,2,3,4,5].map(n=>`<span style="font-size:20px;cursor:${ed?"pointer":"default"};color:${n<=v?"#F59E0B":"#D1D5DB"}" ${ed?`onclick="setStar(${n})"`:""}">★</span>`).join("");}
function badge(sid,sm){const s=SM[sid]||SM.memo;return`<span style="display:inline-flex;align-items:center;gap:3px;background:${s.color}22;color:${s.color};border:1px solid ${s.color}44;border-radius:99px;padding:${sm?"1px 7px":"3px 10px"};font-size:${sm?10:11}px;font-weight:700;white-space:nowrap">${s.emoji} ${s.label}</span>`;}
function chip(label,active,oc){return`<button class="chip${active?" on":""}" onclick="${oc}">${label}</button>`;}
function navBar(active){
  return`<div class="bottom-nav">${[["home","🏠","ホーム"],["add","➕","追加"],["fridge","🥕","冷蔵庫"]].map(([v,ic,lb])=>`<button onclick="${v==="add"?"goAdd()":"sv({view:'"+v+"'})"}" style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 0 10px;gap:2px;background:none;border:none;cursor:pointer;color:${active===v?AC:"#C4A98A"}"><span style="font-size:22px">${ic}</span><span style="font-size:10px;font-weight:700">${lb}</span></button>`).join("")}</div>`;
}

// ─── Auth ─────────────────────────────────────────────────────────────────────
window.doAuth=()=>{
  const f=V.lf;
  if(f.isNew){
    if(!f.name.trim())return sv({lErr:"お名前を入力してください"});
    if(f.password.length<6)return sv({lErr:"パスワードは6文字以上"});
    if(DB.users.find(u=>u.email===f.email))return sv({lErr:"このメールは登録済みです"});
    const nu={email:f.email,password:f.password,name:f.name};
    DB.users.push(nu);dbSave(DB);
    U=nu;sessionStorage.setItem(SESS,JSON.stringify(nu));
    sv({view:"home",lErr:""});
  }else{
    const found=DB.users.find(u=>u.email===f.email&&u.password===f.password);
    if(!found)return sv({lErr:"メールかパスワードが違います"});
    U=found;sessionStorage.setItem(SESS,JSON.stringify(found));
    sv({view:"home",lErr:""});
  }
};
window.doLogout=()=>{U=null;sessionStorage.removeItem(SESS);sv({view:"login",recipes:[...DB.recipes],ingMaster:[...DB.ingMaster]});};
window.ulf=(k,v)=>{V.lf={...V.lf,[k]:v};};
window.toggleAuth=()=>sv({lf:{...V.lf,isNew:!V.lf.isNew},lErr:""});
window.setStar=n=>sv({form:{...V.form,rating:n}});
window.goAdd=()=>sv({view:"add",sel:null,form:{title:"",genre:"和食",source:"cookpad",url:"",memo:"",tags:"",rating:5,thumbnail:"",ingredients:[]},fStep:1,aiState:"idle",aiMsg:""});
window.uf=(k,v)=>{V.form={...V.form,[k]:v};render();};

// ─── AI URL analyze ────────────────────────────────────────────────────────────
window.handleUrl=async(url)=>{
  V.form={...V.form,url,source:dSrc(url)};
  if(!url||!url.startsWith("http")){sv({aiState:"idle",aiMsg:""});return;}
  sv({aiState:"loading",aiMsg:"🤖 AIがURLを解析中..."});
  try{
    const aIng=V.ingMaster.flatMap(c=>c.items);
    const prompt=`レシピURLを分析してJSONのみ返してください（説明文なし）。\nURL: ${url}\n食材リスト: ${aIng.join("、")}\n\n{"title":"料理名","genre":"${GENRES.filter(g=>g!=="すべて").join("/")}のいずれか","memo":"分量とポイント2〜4行","ingredients":["食材1","食材2"],"tags":["タグ1"]}`;
    const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:800,messages:[{role:"user",content:prompt}]})});
    const data=await res.json();
    const text=data.content?.find(b=>b.type==="text")?.text||"";
    const r=JSON.parse(text.replace(/```json|```/g,"").trim());
    if(r){
      const aI=V.ingMaster.flatMap(c=>c.items);
      V.form={...V.form,title:r.title||V.form.title,genre:GENRES.includes(r.genre)?r.genre:"その他",memo:r.memo||V.form.memo,ingredients:(r.ingredients||[]).filter(i=>aI.includes(i)),tags:(r.tags||[]).join(", "),thumbnail:V.form.thumbnail||(dSrc(url)==="youtube"?ytT(url):"")||""};
      sv({aiState:"done",aiMsg:"✅ AI自動入力完了！内容を確認してください"});
    }else sv({aiState:"error",aiMsg:"⚠️ 解析できませんでした。手動で入力してください"});
  }catch{sv({aiState:"error",aiMsg:"⚠️ AI解析エラー。手動で入力してください"});}
};

// ─── Recipe CRUD ───────────────────────────────────────────────────────────────
window.doSave=()=>{
  if(!V.form.title.trim())return;
  sv({saving:true});
  const f=V.form;
  const tags=f.tags.split(/[,、\s]+/).map(t=>t.trim()).filter(Boolean);
  const th=f.thumbnail||(f.url&&dSrc(f.url)==="youtube"?ytT(f.url):"")||"";
  const data={title:f.title,genre:f.genre,source:f.source,url:f.url||"",memo:f.memo||"",tags,rating:f.rating,thumbnail:th,ingredients:f.ingredients};
  if(V.sel&&V.view==="edit"){
    DB.recipes=DB.recipes.map(r=>r.id===V.sel.id?{...r,...data}:r);
    dbSave(DB);const upd=DB.recipes.find(r=>r.id===V.sel.id);
    sv({recipes:[...DB.recipes],sel:upd,view:"detail",saving:false,aiState:"idle",aiMsg:""});
  }else{
    const nr={id:Date.now().toString(),...data,cookedCount:0,createdAt:Date.now()};
    DB.recipes=[nr,...DB.recipes];dbSave(DB);
    sv({recipes:[...DB.recipes],view:"home",saving:false,aiState:"idle",aiMsg:""});
  }
};
window.openDetail=id=>{const r=V.recipes.find(x=>x.id===id);if(r)sv({sel:r,view:"detail"});};
window.doCooked=()=>{
  const r=V.sel;if(!r)return;
  const nc=(r.cookedCount||0)+1;
  DB.recipes=DB.recipes.map(x=>x.id===r.id?{...x,cookedCount:nc}:x);dbSave(DB);
  sv({recipes:[...DB.recipes],sel:{...r,cookedCount:nc}});
};
window.doDelete=()=>{
  const r=V.sel;if(!r||!confirm("「"+r.title+"」を削除しますか？"))return;
  DB.recipes=DB.recipes.filter(x=>x.id!==r.id);dbSave(DB);
  sv({recipes:[...DB.recipes],view:"home",sel:null});
};
window.goEdit=()=>{
  const r=V.sel;if(!r)return;
  sv({view:"edit",form:{title:r.title,genre:r.genre,source:r.source,url:r.url||"",memo:r.memo||"",tags:(r.tags||[]).join(", "),rating:r.rating||5,thumbnail:r.thumbnail||"",ingredients:r.ingredients||[]},fStep:1,aiState:"idle",aiMsg:""});
};

// ─── Ingredients ────────────────────────────────────────────────────────────────
window.tFI=i=>sv({fIng:V.fIng.includes(i)?V.fIng.filter(x=>x!==i):[...V.fIng,i]});
window.tFmI=i=>{V.form={...V.form,ingredients:V.form.ingredients.includes(i)?V.form.ingredients.filter(x=>x!==i):[...V.form.ingredients,i]};render();};

// ─── Category Manager ──────────────────────────────────────────────────────────
window.addItem=catId=>{
  const el=document.getElementById("nii_"+catId);if(!el||!el.value.trim())return;
  const item=el.value.trim();el.value="";
  V.ingMaster=V.ingMaster.map(c=>c.id===catId?{...c,items:[...c.items,item]}:c);
  DB.ingMaster=V.ingMaster;dbSave(DB);
  V.cme=V.cme?.id===catId?{...V.cme,items:[...V.cme.items,item]}:V.cme;
  render();
};
window.delItem=(catId,item)=>{
  V.ingMaster=V.ingMaster.map(c=>c.id===catId?{...c,items:c.items.filter(i=>i!==item)}:c);
  DB.ingMaster=V.ingMaster;dbSave(DB);
  V.cme=V.cme?.id===catId?{...V.cme,items:V.cme.items.filter(i=>i!==item)}:V.cme;
  render();
};
window.toggleCE=id=>sv({cme:V.cme?.id===id?null:V.ingMaster.find(c=>c.id===id)});
window.delCat=id=>{if(!confirm("削除しますか？"))return;V.ingMaster=V.ingMaster.filter(c=>c.id!==id);DB.ingMaster=V.ingMaster;dbSave(DB);sv({ingMaster:V.ingMaster,cme:null});};
window.addCat=()=>{
  if(!V.cnn.trim())return;
  const nc={id:"c_"+Date.now(),icon:V.cni,name:V.cnn.trim(),items:[]};
  V.ingMaster=[...V.ingMaster,nc];DB.ingMaster=V.ingMaster;dbSave(DB);
  sv({ingMaster:V.ingMaster,cnn:"",cmt:"list",cme:nc});
};

// ─── Ingredient Modal ──────────────────────────────────────────────────────────
function ingModal(selected,onTog,onClose,activeCat,setAC){
  const ac=activeCat||V.ingMaster[0]?.id;
  const cc=V.ingMaster.find(x=>x.id===ac)||V.ingMaster[0];
  return`<div class="modal-bg" onclick="if(event.target===this)${onClose}">
    <div class="modal-box" onclick="event.stopPropagation()">
      <div style="padding:16px 20px 12px;border-bottom:2px solid #F0DDD0;display:flex;justify-content:space-between;align-items:center;flex-shrink:0">
        <div><div style="font-weight:900;font-size:17px;color:#2D1B0E">🥕 食材を選ぶ</div><div style="font-size:12px;color:#C4A98A;margin-top:2px">選択中: ${selected.length}個</div></div>
        <button class="btn" style="width:auto;padding:6px 18px;font-size:14px" onclick="${onClose}">完了</button>
      </div>
      <div class="scroll-row" style="flex-shrink:0">${V.ingMaster.map(x=>chip(x.icon+" "+x.name,ac===x.id,`${setAC}('${x.id}')`)).join("")}</div>
      <div style="overflow-y:auto;padding:14px 16px 20px;flex:1">
        <div style="display:flex;flex-wrap:wrap;gap:8px">
          ${(cc?.items||[]).map(i=>{const on=selected.includes(i);return`<button class="chip${on?" on":""}" onclick="${onTog}('${i}')">${on?"✓ ":""}${i}</button>`;}).join("")}
        </div>
      </div>
      ${selected.length>0?`<div style="padding:10px 16px 16px;border-top:2px solid #F0DDD0;flex-shrink:0"><div style="font-size:11px;color:#9C6E4A;margin-bottom:6px;font-weight:800">選択中</div><div style="display:flex;flex-wrap:wrap;gap:6px">${selected.map(i=>`<span style="background:#FFF5EE;border:2px solid #F0DDD0;border-radius:99px;padding:3px 10px;font-size:12px;color:${AC};font-weight:700;cursor:pointer" onclick="${onTog}('${i}')">${i} ✕</span>`).join("")}</div></div>`:""}
    </div>
  </div>`;
}

// ─── Category Manager Modal ────────────────────────────────────────────────────
function catMgrModal(){
  const ICONS=["🍱","🧄","🧅","🥩","🫕","🥘","🍲","🥗","🍜","🧆","🥞","🍕","🌮","🍣","🧁","🍰","🥤","🌿","🫚","🫙"];
  return`<div class="modal-bg" onclick="if(event.target===this)sv({showCM:false})">
    <div class="modal-box" style="max-height:88vh" onclick="event.stopPropagation()">
      <div style="padding:16px 20px 0;border-bottom:2px solid #F0DDD0;flex-shrink:0">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
          <div style="font-weight:900;font-size:17px;color:#2D1B0E">⚙️ 食材カテゴリ管理</div>
          <button class="btn" style="width:auto;padding:6px 18px;font-size:14px" onclick="sv({showCM:false})">閉じる</button>
        </div>

function filtered(){
  return V.recipes
    .filter(r=>V.fGenre==="すべて"||r.genre===V.fGenre)
    .filter(r=>V.fSrc==="all"||r.source===V.fSrc)
    .filter(r=>!V.q||(r.title+(r.memo||"")+(r.tags||[]).join("")+(r.ingredients||[]).join("")).includes(V.q))

}

      <div style="display:flex;align-items:center;justify-content:space-between">
        <div><div style="font-weight:900;font-size:18px;color:#2D1B0E">🥕 冷蔵庫から探す</div><div style="font-size:12px;color:#C4A98A">食材を選んでレシピを絞り込もう</div></div>
        <button onclick="sv({showCM:true})" style="background:#FFF5EE;border:2px solid #F0DDD0;border-radius:12px;padding:6px 12px;font-size:12px;color:#9C6E4A;cursor:pointer;font-weight:700">⚙️ カテゴリ管理</button>
      </div>
    </div>
    <div class="scroll-row">${V.ingMaster.map(x=>chip(x.icon+" "+x.name,ac===x.id,"sv({fc:'"+x.id+"'})")).join("")}</div>
    <div style="padding:12px 16px;background:#fff;border-bottom:2px solid #F0DDD0">
      <div style="font-size:11px;font-weight:800;color:#9C6E4A;margin-bottom:8px">${cc?.icon} ${esc(cc?.name)}</div>
      <div style="display:flex;flex-wrap:wrap;gap:8px">
        ${(cc?.items||[]).map(i=>{const on=V.fIng.includes(i);return`<button class="chip${on?" on":""}" onclick="tFI('${i}')">${on?"✓ ":""}${esc(i)}</button>`;}).join("")}
      </div>
    </div>
    ${V.fIng.length>0?`<div style="padding:8px 16px;background:#FFF5EE;border-bottom:1px solid #F0DDD0;display:flex;gap:6px;align-items:center;flex-wrap:wrap"><span style="font-size:12px;color:#9C6E4A;font-weight:800;white-space:nowrap">選択中:</span>${V.fIng.map(i=>`<span style="background:#fff;border:2px solid ${AC};border-radius:99px;padding:3px 10px;font-size:12px;color:${AC};font-weight:700;cursor:pointer" onclick="tFI('${i}')">${esc(i)} ✕</span>`).join("")}<button onclick="sv({fIng:[]})" style="background:none;border:none;font-size:12px;color:#C4A98A;cursor:pointer;margin-left:auto">全クリア</button></div>`:""}
    <div style="padding:8px 16px;background:#FFF8F0;border-bottom:1px solid #F0DDD0;font-size:12px;color:#9C6E4A;font-weight:700">${V.fIng.length>0?"🔍 "+res.length+"件ヒット":"📚 全"+V.recipes.length+"件"}</div>
    <div style="flex:1;padding:12px;padding-bottom:80px">
      ${res.length===0?`<div style="text-align:center;padding:60px 20px;color:#C4A98A"><div style="font-size:44px;margin-bottom:12px">🥺</div><div style="font-size:16px;font-weight:700">該当レシピなし</div></div>`:`
      <div class="grid2">${res.map(r=>`<div class="card" onclick="openDetail('${r.id}')">
        ${r.thumbnail?`<img src="${esc(r.thumbnail)}" style="width:100%;aspect-ratio:4/3;object-fit:cover;background:#F5E6D8;display:block" loading="lazy">`:`<div style="width:100%;aspect-ratio:4/3;background:#F5E6D8;display:flex;align-items:center;justify-content:center;font-size:36px">🍽️</div>`}
        <div style="padding:10px 12px 12px">
          <div style="font-size:13px;font-weight:800;color:#2D1B0E;margin-bottom:5px;line-height:1.3;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical">${esc(r.title)}</div>
          ${(r.ingredients||[]).length>0?`<div style="display:flex;flex-wrap:wrap;gap:3px;margin-bottom:5px">${r.ingredients.slice(0,3).map(i=>`<span style="background:${V.fIng.includes(i)?AC:"#F5E6D8"};color:${V.fIng.includes(i)?"#fff":"#9C6E4A"};border-radius:99px;padding:1px 7px;font-size:9px;font-weight:700">${esc(i)}</span>`).join("")}</div>`:""}
          <div>${stars(r.rating,false)}</div>
        </div>
      </div>`).join("")}</div>`}
    </div>
    ${navBar("fridge")}
    ${V.showCM?catMgrModal():""}
  </div>`;}

// ─── Render ────────────────────────────────────────────────────────────────────
function render(){
  const el=document.getElementById("app");if(!el)return;
  if(V.view==="login")el.innerHTML=vLogin();
  else if(V.view==="home")el.innerHTML=vHome();
  else if(V.view==="detail")el.innerHTML=vDetail();
  else if(V.view==="add"||V.view==="edit")el.innerHTML=vAdd();
  else if(V.view==="fridge")el.innerHTML=vFridge();
}

// nextStep fix
window.goNext=()=>{if(V.form.title.trim()&&V.aiState!=="loading")sv({fStep:2});};

render();
</script>
</body>
</html>
