<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="My Recipe Book">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#3D2E1E">
<title>My Recipe Book</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --b1:#FAF6EE;--b2:#F2EAD8;--b3:#E0D0B4;--b4:#C8B490;--b5:#A89070;
  --br:#3D2E1E;--bm:#6B5040;--bl:#9C8068;
  --am:#C8980A;--al:#E0AE20;--ad:#9A7208;--ap:#FBF4DC;
  --rd:#9A3A2A;--rdp:#F8EAE6;--wh:#FEFCF7;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
html,body{background:var(--b1);overscroll-behavior:none}
body{font-family:'Noto Sans JP','Hiragino Sans',sans-serif;color:var(--br);font-weight:400}
.serif{font-family:'Playfair Display',Georgia,serif}
input,select,textarea,button{font-family:'Noto Sans JP',sans-serif;color:var(--br)}
::-webkit-scrollbar{display:none}
.app{max-width:430px;margin:0 auto;min-height:100vh;background:var(--b1)}
.srow{display:flex;gap:8px;overflow-x:auto;padding:10px 16px;background:var(--wh);border-bottom:1px solid var(--b3);scrollbar-width:none}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px;padding:14px}
.mbg{position:fixed;inset:0;background:rgba(30,18,8,.65);z-index:500;display:flex;align-items:flex-end}
.mbox{background:var(--b1);border-radius:24px 24px 0 0;width:100%;max-width:430px;margin:0 auto;max-height:84vh;display:flex;flex-direction:column;border-top:2px solid var(--am)}
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--wh);border-top:1px solid var(--b3);display:flex;z-index:200}
.fab{position:fixed;bottom:72px;right:max(16px,calc(50% - 200px));background:var(--am);color:var(--wh);border:none;border-radius:50%;width:54px;height:54px;font-size:22px;cursor:pointer;box-shadow:0 4px 20px rgba(200,152,10,.4);display:flex;align-items:center;justify-content:center;z-index:150}
.chip{border:1px solid var(--b3);background:var(--wh);color:var(--bm);border-radius:99px;padding:6px 14px;font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap}
.on{border-color:var(--am)!important;background:var(--am)!important;color:var(--wh)!important}
.card{background:var(--wh);border-radius:16px;overflow:hidden;box-shadow:0 2px 14px rgba(61,46,30,.07);cursor:pointer;border:1px solid var(--b3)}
.fi{width:100%;padding:12px 14px;border:1px solid var(--b3);border-radius:12px;font-size:16px;background:var(--wh);color:var(--br);outline:none;display:block}
.fi:focus{border-color:var(--am)}
textarea.fi{resize:vertical;min-height:80px}
.lbl{font-size:10px;font-weight:700;color:var(--b5);margin-bottom:6px;display:block;letter-spacing:1.5px;text-transform:uppercase}
.btn{background:var(--am);color:var(--wh);border:none;border-radius:12px;padding:13px 16px;font-size:15px;font-weight:600;cursor:pointer;width:100%;display:block;text-align:center;letter-spacing:.3px}
.btn.sec{background:var(--b2);color:var(--bm);border:1px solid var(--b3)}
.btn.danger{background:var(--rdp);color:var(--rd);border:1px solid #DDB8B0}
.btn:disabled{background:var(--b3);color:var(--bl);cursor:not-allowed}
/* パスワード表示トグル */
.pw-wrap{position:relative;margin-bottom:12px}
.pw-wrap input{width:100%;padding-right:46px}
.pw-eye{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--bl);font-size:16px;padding:4px;line-height:1}
</style>
<!-- Firebase SDK（クロスデバイス同期用） -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
</head>
<body>
<div class="app" id="app"></div>
<script>
const GENRES=["すべて","和食","洋食","中華","韓国料理","イタリアン","デザート","お弁当","麺・パスタ","スープ","サラダ","その他"];
const SOURCES=[
  {id:"instagram",label:"Instagram",color:"#C2185B"},
  {id:"youtube",label:"YouTube",color:"#C62828"},
  {id:"tiktok",label:"TikTok",color:"#505050"},
  {id:"twitter",label:"X / Twitter",color:"#1565C0"},
  {id:"cookpad",label:"Cookpad",color:"#B84800"},
  {id:"kurashiru",label:"クラシル",color:"#2E7D32"},
  {id:"website",label:"Web サイト",color:"#4A5568"},
  {id:"memo",label:"自分メモ",color:"#6B46C1"}
];
const SM=Object.fromEntries(SOURCES.map(s=>[s.id,s]));
const DEFING=[
  {id:"pork",color:"#C85A3A",name:"豚肉",items:["豚バラ","豚こま切れ","豚ロース","豚肩ロース","豚もも","豚ひき肉","豚スペアリブ","豚レバー"]},
  {id:"beef",color:"#8B3A2A",name:"牛肉",items:["牛バラ","牛こま切れ","牛ロース","牛ひき肉","牛もも","牛すね","牛タン","牛カルビ"]},
  {id:"chicken",color:"#D4844A",name:"鶏肉",items:["鶏むね肉","鶏もも肉","鶏ささみ","鶏手羽元","鶏手羽先","鶏ひき肉","鶏レバー","鶏皮"]},
  {id:"seafood",color:"#3A6A8A",name:"魚介",items:["サーモン","マグロ","アジ","サバ","鮭","タラ","エビ","イカ","ホタテ","アサリ","カニ","タコ"]},
  {id:"egg",color:"#D4A820",name:"卵・乳製品",items:["卵","牛乳","生クリーム","バター","チーズ","ヨーグルト","豆腐","油揚げ"]},
  {id:"veg",color:"#4A7A3A",name:"野菜",items:["玉ねぎ","にんにく","しょうが","じゃがいも","にんじん","大根","キャベツ","レタス","トマト","なす","ピーマン","ブロッコリー","ほうれん草","小松菜","白菜","もやし","ねぎ","ごぼう","れんこん","アボカド"]},
  {id:"mush",color:"#7A5A3A",name:"きのこ",items:["しいたけ","えのき","しめじ","エリンギ","なめこ","まいたけ"]},
  {id:"grain",color:"#A08A5A",name:"穀物・麺",items:["米","パスタ","うどん","そば","ラーメン","そうめん","パン粉","小麦粉","片栗粉"]},
  {id:"beans",color:"#5A6A3A",name:"豆・大豆",items:["豆腐","納豆","大豆","ひよこ豆","小豆","枝豆","厚揚げ"]}
];
const SEED=[
  {id:"1",title:"肉じゃが",genre:"和食",source:"cookpad",url:"https://cookpad.com",thumbnail:"https://images.unsplash.com/photo-1547592166-23ac45744acd?w=400&q=80",memo:"砂糖大さじ2、醤油大さじ3。じゃがいもは最後に入れると崩れない！",tags:["定番","お弁当"],rating:5,cookedCount:8,createdAt:Date.now()-864e5*10,ingredients:["豚こま切れ","じゃがいも","玉ねぎ","にんじん"]},
  {id:"2",title:"カルボナーラ",genre:"イタリアン",source:"youtube",url:"",thumbnail:"https://images.unsplash.com/photo-1612874742237-6526221588e3?w=400&q=80",memo:"卵黄2個＋全卵1個。火を止めてから混ぜるのがポイント。",tags:["時短","パスタ"],rating:4,cookedCount:5,createdAt:Date.now()-864e5*5,ingredients:["パスタ","卵","生クリーム","チーズ"]},
  {id:"3",title:"キムチ鍋",genre:"韓国料理",source:"tiktok",url:"",thumbnail:"https://images.unsplash.com/photo-1583224964978-2257b8a897b8?w=400&q=80",memo:"キムチ200g、豆腐1丁、豚バラ200g。ごま油で仕上げ。",tags:["冬","鍋"],rating:4,cookedCount:6,createdAt:Date.now()-864e5*1,ingredients:["豚バラ","豆腐","白菜","ねぎ","えのき"]},
  {id:"4",title:"鶏むね照り焼き",genre:"和食",source:"kurashiru",url:"",thumbnail:"https://images.unsplash.com/photo-1598515214211-89d3c73ae83b?w=400&q=80",memo:"醤油・みりん・酒各大さじ2。片栗粉まぶすとジューシー！",tags:["ヘルシー","お弁当"],rating:5,cookedCount:12,createdAt:Date.now()-864e5*3,ingredients:["鶏むね肉","しょうが","にんにく"]}
];

const DBK="rb_v6",SSK="rb_s6";
// ── Firebase 設定（クロスデバイス同期を有効にするには以下を入力してください） ──
const FB_CONFIG={apiKey:"AIzaSyDBjG-M23a_lDcs39AmFGksg40YB1595rc",authDomain:"my-recipe-book-23b9d.firebaseapp.com",projectId:"my-recipe-book-23b9d",storageBucket:"my-recipe-book-23b9d.firebasestorage.app",messagingSenderId:"25316205052",appId:"1:25316205052:web:c69b73f057b6d51b61d279"};
const FB_ON=!!FB_CONFIG.apiKey;
let fbAuth=null,fbDB=null,_fbReady=!FB_ON;
if(FB_ON){
  firebase.initializeApp(FB_CONFIG);
  fbAuth=firebase.auth();
  fbDB=firebase.firestore();
}
function dbl_local(){try{const d=localStorage.getItem(DBK);if(d)return JSON.parse(d);const OLD=["rb_eg_v1","rb_pr_v1","rb_v5","rb_v4","recipeBook_data_v2","recipeBook_widget_v1","rb_data"];for(const k of OLD){try{const o=localStorage.getItem(k);if(o){const p=JSON.parse(o);if(p&&p.users){localStorage.setItem(DBK,o);return p;}}}catch{}}return null;}catch{return null;}}
function dbs_local(d){try{localStorage.setItem(DBK,JSON.stringify(d));}catch{}}
function dbs(d){dbs_local(d);if(FB_ON&&fbDB&&U?.uid)fbDB.collection("rb").doc(U.uid).set({recipes:d.recipes,ingMaster:d.ingMaster,name:U.name||""}).catch(()=>{});}
let DB=dbl_local();
if(!DB){DB={recipes:JSON.parse(JSON.stringify(SEED)),users:[],ingMaster:JSON.parse(JSON.stringify(DEFING))};dbs_local(DB);}
if(!DB.ingMaster){DB.ingMaster=JSON.parse(JSON.stringify(DEFING));dbs_local(DB);}
if(!DB.users){DB.users=[];dbs_local(DB);}
async function _loadFB(user){try{const doc=await fbDB.collection("rb").doc(user.uid).get();if(doc.exists){const d=doc.data();DB={recipes:d.recipes||[],ingMaster:d.ingMaster||JSON.parse(JSON.stringify(DEFING)),users:[]};U={uid:user.uid,email:user.email,name:d.name||user.email};}else{DB={recipes:JSON.parse(JSON.stringify(SEED)),ingMaster:JSON.parse(JSON.stringify(DEFING)),users:[]};U={uid:user.uid,email:user.email,name:user.email};}}catch{DB={recipes:[],ingMaster:JSON.parse(JSON.stringify(DEFING)),users:[]};U={uid:user.uid,email:user.email,name:user.email};}}
function _fbErrMsg(c){if(c==="auth/user-not-found"||c==="auth/wrong-password"||c==="auth/invalid-credential")return"メールアドレスまたはパスワードが違います";if(c==="auth/email-already-in-use")return"このメールアドレスはすでに登録されています";if(c==="auth/invalid-email")return"メールアドレスの形式が正しくありません";if(c==="auth/too-many-requests")return"ログイン試行回数が多すぎます。しばらくしてからお試しください";return"エラーが発生しました（"+c+"）";}

let U=null;
if(!FB_ON){try{const s=sessionStorage.getItem(SSK);if(s){const u=JSON.parse(s);const f=DB.users.find(x=>x.email===u.email);if(f)U=f;}}catch{}}
else{fbAuth.onAuthStateChanged(async(user)=>{if(user){await _loadFB(user);_fbReady=true;V.view="home";V.recipes=[...DB.recipes];V.ingMaster=[...DB.ingMaster];render();}else{_fbReady=true;U=null;V.view="login";render();}});}

// ── 認証はDOMから直接値を読む（再描画でリセットしない） ──
let authMode="login"; // login | register | reset
let showPw=false;
let lErr="";
let resetMsg="";

let V={
  view:U?"home":"login",recipes:[...DB.recipes],ingMaster:[...DB.ingMaster],sel:null,
  fGenre:"すべて",fSrc:"all",q:"",sort:"newest",fIng:[],
  showIM:false,showCM:false,showFI:false,
  form:{title:"",genre:"和食",source:"cookpad",url:"",memo:"",tags:"",rating:5,thumbnail:"",ingredients:[]},
  fStep:1,saving:false,aiState:"idle",aiMsg:"",
  imc:null,fic:null,cmt:"list",cme:null,cnn:"",cncol:"#C85A3A",fc:null
};

function sv(p){Object.assign(V,p);render();}
window.sv=sv;

function renderAuth(){
  lErr=lErr||"";
  const app=document.getElementById("app");
  if(!app)return;

  let html=`<div style="min-height:100vh;background:linear-gradient(170deg,var(--b1) 0%,var(--b2) 60%,var(--b3) 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px">
    <div style="margin-bottom:24px;text-align:center">
      <div style="display:inline-flex;align-items:center;gap:8px">
        <span style="display:inline-block;width:28px;height:2px;background:var(--am)"></span>
        <span class="serif" style="font-size:11px;color:var(--am);letter-spacing:4px;font-style:italic">Kitchen Garden</span>
        <span style="display:inline-block;width:28px;height:2px;background:var(--am)"></span>
      </div>
    </div>
    <div style="background:var(--wh);border-radius:20px;padding:40px 30px;width:100%;max-width:380px;box-shadow:0 10px 40px rgba(61,46,30,.10);border:1px solid var(--b3)">
      <div class="serif" style="font-size:26px;color:var(--br);text-align:center;margin-bottom:8px">My Recipe Book</div>
      <div style="display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:24px">
        <span style="display:inline-block;width:20px;height:1px;background:var(--b3)"></span>
        <span style="font-size:11px;color:var(--bl);letter-spacing:.5px">${authMode==="login"?"おかえりなさい":authMode==="register"?"アカウントを作成":"パスワードを再設定"}</span>
        <span style="display:inline-block;width:20px;height:1px;background:var(--b3)"></span>
      </div>`;

  if(authMode==="reset"){
    html+=`
      <div style="font-size:13px;color:var(--bm);margin-bottom:14px;line-height:1.7">
        ${FB_ON?"登録時のメールアドレスを入力してください。パスワードリセットメールをお送りします。":"登録時のメールアドレスを入力してください。新しいパスワードを設定できます。"}
      </div>
      <div style="margin-bottom:12px">
        <input id="reset_email" class="fi" placeholder="メールアドレス" type="email" style="margin-bottom:0">
      </div>
      ${!FB_ON?`<div style="margin-bottom:12px"><input id="reset_newpw" class="fi" placeholder="新しいパスワード（6文字以上）" type="${showPw?"text":"password"}" style="margin-bottom:0;padding-right:46px"></div>`:""}
      ${resetMsg?`<div style="color:${resetMsg.includes("完了")||resetMsg.includes("変更")||resetMsg.includes("送信")?"#2E7D32":"var(--rd)"};font-size:13px;margin-bottom:12px;padding:10px 14px;border-radius:10px;background:${resetMsg.includes("完了")||resetMsg.includes("変更")||resetMsg.includes("送信")?"#EEF5EA":"var(--rdp)"};border:1px solid ${resetMsg.includes("完了")||resetMsg.includes("変更")||resetMsg.includes("送信")?"#A8D5A8":"#DDB8B0"}">${resetMsg}</div>`:""}
      <button class="btn" onclick="doReset()" style="margin-bottom:10px">${FB_ON?"リセットメールを送信する":"パスワードを変更する"}</button>
      <button class="btn sec" onclick="setAuthMode('login')">ログインに戻る</button>`;
  } else {
    html+=`
      ${authMode==="register"?`<div style="margin-bottom:12px"><input id="auth_name" class="fi" placeholder="お名前" style="margin-bottom:0"></div>`:""}
      <div style="margin-bottom:12px"><input id="auth_email" class="fi" placeholder="メールアドレス" type="email" style="margin-bottom:0"></div>
      <div class="pw-wrap">
        <input id="auth_pw" class="fi" placeholder="パスワード（6文字以上）" type="${showPw?"text":"password"}" style="padding-right:46px;margin-bottom:0">
        <button class="pw-eye" onclick="togglePw()" title="${showPw?"隠す":"表示"}">${showPw?`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`:`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`}</button>
      </div>
      ${lErr?`<div style="color:var(--rd);font-size:13px;margin-bottom:12px;background:var(--rdp);padding:10px 14px;border-radius:10px;border:1px solid #DDB8B0">${lErr}</div>`:""}
      <button class="btn" onclick="doAuth()" style="margin-bottom:10px">${authMode==="register"?"登録する":"ログイン"}</button>
      <button class="btn sec" onclick="setAuthMode('${authMode==="login"?"register":"login"}')" style="margin-bottom:10px">${authMode==="login"?"新規登録はこちら":"すでにアカウントをお持ちの方"}</button>
      ${authMode==="login"?`<button style="background:none;border:none;width:100%;text-align:center;font-size:12px;color:var(--bl);cursor:pointer;padding:6px;letter-spacing:.3px;text-decoration:underline" onclick="setAuthMode('reset')">パスワードをお忘れの方</button>`:""}`;
  }

  html+=`
      <div style="margin-top:18px;font-size:11px;color:var(--b4);text-align:center;letter-spacing:.3px">${FB_ON?"データはクラウドに保存されます（全デバイス共通）":"データはこのブラウザに保存されます"}</div>
    </div>
  </div>`;
  app.innerHTML=html;
}

window.setAuthMode=(m)=>{authMode=m;lErr="";resetMsg="";renderAuth();};
window.togglePw=()=>{const e=document.getElementById("auth_email")?.value||"";const p=document.getElementById("auth_pw")?.value||"";const n=document.getElementById("auth_name")?.value||"";const re=document.getElementById("reset_email")?.value||"";const rp=document.getElementById("reset_newpw")?.value||"";showPw=!showPw;renderAuth();const ae=document.getElementById("auth_email");if(ae)ae.value=e;const ap=document.getElementById("auth_pw");if(ap)ap.value=p;const an=document.getElementById("auth_name");if(an)an.value=n;const rfe=document.getElementById("reset_email");if(rfe)rfe.value=re;const rfp=document.getElementById("reset_newpw");if(rfp)rfp.value=rp;};

window.doAuth=()=>{
  if(FB_ON){_doAuthFB();return;}
  const email=(document.getElementById("auth_email")?.value||"").trim().toLowerCase();
  const pw=(document.getElementById("auth_pw")?.value||"").trim();
  const name=(document.getElementById("auth_name")?.value||"").trim();
  lErr="";
  if(authMode==="register"){
    if(!name){lErr="お名前を入力してください";renderAuth();return;}
    if(!email){lErr="メールアドレスを入力してください";renderAuth();return;}
    if(pw.length<6){lErr="パスワードは6文字以上にしてください";renderAuth();return;}
    if(DB.users.find(u=>u.email.toLowerCase()===email)){lErr="このメールアドレスはすでに登録されています";renderAuth();return;}
    const nu={email,password:pw,name};
    DB.users.push(nu);dbs(DB);
    U=nu;sessionStorage.setItem(SSK,JSON.stringify(nu));
    lErr="";sv({view:"home"});
  } else {
    if(!email){lErr="メールアドレスを入力してください";renderAuth();return;}
    if(!pw){lErr="パスワードを入力してください";renderAuth();return;}
    const fd=DB.users.find(u=>u.email.toLowerCase()===email&&u.password===pw);
    if(!fd){
      if(DB.users.length===0){lErr="このデバイスにはまだアカウントがありません。「新規登録はこちら」からアカウントを作成してください（データはブラウザごとに保存されます）";}
      else{lErr="メールアドレスまたはパスワードが違います";}
      renderAuth();return;
    }
    U=fd;sessionStorage.setItem(SSK,JSON.stringify(fd));
    lErr="";sv({view:"home"});
  }
};
async function _doAuthFB(){
  const email=(document.getElementById("auth_email")?.value||"").trim().toLowerCase();
  const pw=(document.getElementById("auth_pw")?.value||"").trim();
  const name=(document.getElementById("auth_name")?.value||"").trim();
  lErr="";
  if(authMode==="register"){
    if(!name){lErr="お名前を入力してください";renderAuth();return;}
    if(!email){lErr="メールアドレスを入力してください";renderAuth();return;}
    if(pw.length<6){lErr="パスワードは6文字以上にしてください";renderAuth();return;}
    try{
      const uc=await fbAuth.createUserWithEmailAndPassword(email,pw);
      await fbDB.collection("rb").doc(uc.user.uid).set({recipes:JSON.parse(JSON.stringify(SEED)),ingMaster:JSON.parse(JSON.stringify(DEFING)),name});
      U={uid:uc.user.uid,email,name};
      DB={recipes:JSON.parse(JSON.stringify(SEED)),ingMaster:JSON.parse(JSON.stringify(DEFING)),users:[]};

function dSrc(u){if(!u)return"memo";if(u.includes("instagram"))return"instagram";if(u.includes("youtube")||u.includes("youtu.be"))return"youtube";if(u.includes("tiktok"))return"tiktok";if(u.includes("twitter")||u.includes("x.com"))return"twitter";if(u.includes("cookpad"))return"cookpad";if(u.includes("kurashiru"))return"kurashiru";return"website";}
function ytT(u){const m=u.match(/(?:v=|youtu\.be\/)([A-Za-z0-9_-]{11})/);return m?"https://img.youtube.com/vi/"+m[1]+"/hqdefault.jpg":null;}
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;");}
function stars(v,ed){return`<div style="display:flex;gap:3px;align-items:center">${[1,2,3,4,5].map(n=>`<span style="font-size:14px;cursor:${ed?"pointer":"default"};color:${n<=v?"var(--am)":"var(--b3)"};line-height:1" ${ed?`onclick="setStar(${n})"`:""}">★</span>`).join("")}</div>`;}
function badge(sid,sm){const s=SM[sid]||SM.memo;return`<span style="display:inline-flex;align-items:center;gap:5px;background:${s.color}14;color:${s.color};border:1px solid ${s.color}28;border-radius:4px;padding:${sm?"2px 8px":"3px 10px"};font-size:${sm?10:11}px;font-weight:500;white-space:nowrap"><span style="width:5px;height:5px;border-radius:50%;background:${s.color};flex-shrink:0;display:inline-block"></span>${s.label}</span>`;}
function chip(l,on,oc){return`<button class="chip${on?" on":""}" onclick="${oc}">${l}</button>`;}
function navBar(act){return`<div class="bnav">${[["home","一覧","≡"],["add","追加","＋"],["fridge","冷蔵庫","▦"]].map(([v,lb,ic])=>`<button onclick="${v==="add"?"goAdd()":"sv({view:'"+v+"'})"}" style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 0 10px;gap:2px;background:none;border:none;cursor:pointer;color:${act===v?"var(--am)":"var(--b4)"}"><span style="font-size:18px;font-family:'Playfair Display',serif;line-height:1">${ic}</span><span style="font-size:10px;letter-spacing:.5px">${lb}</span></button>`).join("")}</div>`;}

function filtered(){

        <button onclick="sv({showCM:true})" style="background:rgba(255,252,248,.12);border:1px solid rgba(255,252,248,.2);border-radius:10px;padding:7px 12px;font-size:12px;color:var(--b3);cursor:pointer;letter-spacing:.3px">カテゴリ管理</button>
      </div>
      <div style="height:2px;background:linear-gradient(90deg,var(--am),var(--al),transparent)"></div>
    </div>
    <div class="srow">${V.ingMaster.map(x=>`<button onclick="sv({fc:'${x.id}'})" style="display:inline-flex;align-items:center;gap:5px;border:1px solid ${ac===x.id?x.color:"var(--b3)"};background:${ac===x.id?x.color+"18":"var(--wh)"};color:${ac===x.id?x.color:"var(--bm)"};border-radius:99px;padding:6px 14px;font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap"><span style="width:7px;height:7px;border-radius:50%;background:${x.color};flex-shrink:0;display:inline-block"></span>${x.name}</button>`).join("")}</div>
    <div style="padding:14px 16px;background:var(--wh);border-bottom:1px solid var(--b3)">
      <div style="font-size:10px;font-weight:700;color:var(--b5);margin-bottom:10px;letter-spacing:1.5px">${esc(cc?.name)}</div>
      <div style="display:flex;flex-wrap:wrap;gap:8px">${(cc?.items||[]).map(i=>{const on=V.fIng.includes(i);return`<button onclick="tFI('${i}')" style="display:inline-flex;align-items:center;gap:5px;border:1px solid ${on?cc.color+"66":"var(--b3)"};background:${on?cc.color+"18":"var(--wh)"};color:${on?cc.color:"var(--bm)"};border-radius:99px;padding:7px 14px;font-size:13px;font-weight:${on?"600":"400"};cursor:pointer"><span style="width:6px;height:6px;border-radius:50%;background:${cc.color};flex-shrink:0;display:inline-block"></span>${on?"✓ ":""}${esc(i)}</button>`;}).join("")}</div>
    </div>
    ${V.fIng.length>0?`<div style="padding:10px 16px;background:var(--ap);border-bottom:1px solid var(--am)30;display:flex;gap:6px;align-items:center;flex-wrap:wrap"><span style="font-size:10px;color:var(--ad);font-weight:700;white-space:nowrap;letter-spacing:.8px">選択中の食材</span>${V.fIng.map(i=>{const c2=V.ingMaster.find(x=>x.items.includes(i));const col=c2?.color||"var(--b4)";return`<span onclick="tFI('${i}')" style="display:inline-flex;align-items:center;gap:4px;background:var(--wh);border:1px solid ${col}44;border-radius:99px;padding:3px 10px;font-size:11px;color:${col};cursor:pointer"><span style="width:5px;height:5px;border-radius:50%;background:${col};display:inline-block"></span>${esc(i)} ×</span>`;}).join("")}<button onclick="sv({fIng:[]})" style="background:none;border:none;font-size:11px;color:var(--bl);cursor:pointer;margin-left:auto;letter-spacing:.3px">すべてクリア</button></div>`:""}
    <div style="padding:7px 16px;background:var(--b2);border-bottom:1px solid var(--b3);font-size:11px;color:var(--bl);letter-spacing:.3px">${V.fIng.length>0?res.length+"件ヒット":"全"+V.recipes.length+"件"}</div>
    <div style="flex:1;padding:14px;padding-bottom:84px">
      ${res.length===0?`<div style="text-align:center;padding:64px 20px;color:var(--bl)"><div class="serif" style="font-size:16px;color:var(--b4);font-style:italic">該当するレシピがありません</div><div style="font-size:13px;margin-top:8px">食材の組み合わせを変えてみてください</div></div>`:`
      <div class="g2">${res.map(r=>{const mainIng=r.ingredients?.[0];const cat2=V.ingMaster.find(c=>c.items.includes(mainIng));const acCol=cat2?.color||"var(--b3)";
        return`<div class="card" onclick="openDetail('${r.id}')">
          <div style="position:relative">
            ${r.thumbnail?`<img src="${esc(r.thumbnail)}" style="width:100%;aspect-ratio:4/3;object-fit:cover;background:var(--b2);display:block" loading="lazy">`:`<div style="width:100%;aspect-ratio:4/3;background:var(--b2);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px"><div style="display:flex;gap:4px">${(r.ingredients||[]).slice(0,3).map(i=>{const c2=V.ingMaster.find(x=>x.items.includes(i));return`<span style="width:10px;height:10px;border-radius:50%;background:${c2?.color||"var(--b3)"}"></span>`;}).join("")}</div><span class="serif" style="font-size:11px;color:var(--b4);font-style:italic">${esc(r.genre)}</span></div>`}
            <div style="position:absolute;top:0;left:0;width:3px;height:100%;background:${acCol};opacity:.8"></div>
          </div>
          <div style="padding:10px 12px 12px">
            <div style="font-size:13px;font-weight:600;color:var(--br);margin-bottom:5px;line-height:1.4;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical">${esc(r.title)}</div>
            ${(r.ingredients||[]).length>0?`<div style="display:flex;flex-wrap:wrap;gap:3px;margin-bottom:5px">${r.ingredients.slice(0,3).map(i=>{const c2=V.ingMaster.find(x=>x.items.includes(i));const col=c2?.color||"var(--b4)";return`<span style="display:inline-flex;align-items:center;gap:3px;background:${V.fIng.includes(i)?col+"22":"transparent"};border:1px solid ${col}${V.fIng.includes(i)?"44":"22"};border-radius:99px;padding:1px 7px;font-size:9px;color:${col}"><span style="width:4px;height:4px;border-radius:50%;background:${col};display:inline-block"></span>${esc(i)}</span>`;}).join("")}</div>`:""}
            ${stars(r.rating,false)}
          </div>
        </div>`;}).join("")}</div>`}
    </div>
    ${navBar("fridge")}
    ${V.showCM?catMod():""}
  </div>`;}

function render(){
  const el=document.getElementById("app");if(!el)return;
  if(!_fbReady){el.innerHTML=`<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--b1)"><div style="text-align:center;color:var(--bm);padding:20px"><div style="font-size:32px;margin-bottom:12px">🍳</div><div style="font-size:14px;color:var(--bl);letter-spacing:.5px">読み込み中...</div></div></div>`;return;}
  const sY=window.scrollY;const foc=document.activeElement;const fId=foc?.id;const fSS=foc?.selectionStart;const fSE=foc?.selectionEnd;
  if(V.view==="login"){renderAuth();window.scrollTo(0,sY);return;}
  if(V.view==="home")el.innerHTML=vHome();
  else if(V.view==="detail")el.innerHTML=vDetail();
  else if(V.view==="add"||V.view==="edit")el.innerHTML=vAdd();
  else if(V.view==="fridge")el.innerHTML=vFridge();
  window.scrollTo(0,sY);
  if(fId){const el2=document.getElementById(fId);if(el2){el2.focus();try{if(el2.setSelectionRange&&fSS!=null)el2.setSelectionRange(fSS,fSE);}catch{}}}
}
render();
</script>
</body>
</html>
